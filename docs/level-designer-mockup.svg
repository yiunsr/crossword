  <text x="1088" y="780" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;randomWordPolicy count="1" /&gt;</text>
  <text x="1088" y="802" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;connectorWordPolicy min="4" max="5" /&gt;</text>
  <text x="1088" y="824" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;difficulty min="1" max="3" /&gt;</text>
  <text x="1088" y="846" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;seedPolicy defaultSeed="2501" /&gt;</text>
