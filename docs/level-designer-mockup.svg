  <text x="1088" y="648" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">&lt;stage id="stage-025" level="25"&gt;</text>
  <text x="1088" y="670" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;board rows="10" columns="10" /&gt;</text>
  <text x="1088" y="692" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;requiredGroups&gt;</text>
