  <text x="1110" y="724" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;grades&gt;1,2&lt;/grades&gt;</text>
  <text x="1110" y="746" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;requiredGroups&gt;...&lt;/requiredGroups&gt;</text>
  <text x="1110" y="768" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;randomWordPolicy count="1" /&gt;</text>
  <text x="1110" y="790" font-family="Courier New, monospace" font-size="13" fill="#BFDBFE">  &lt;connectorWordPolicy min="3" max="5" /&gt;</text>
