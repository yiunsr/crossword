  <text x="1088" y="284" font-family="Arial, sans-serif" font-size="16" fill="#0F766E">• 고사성어 포함: 예</text>
  <text x="1088" y="316" font-family="Arial, sans-serif" font-size="16" fill="#0F766E">• 평균 등급: 2.25</text>
  <text x="1088" y="348" font-family="Arial, sans-serif" font-size="16" fill="#0F766E">• 예상 connector: 4~5개</text>
  <text x="1088" y="380" font-family="Arial, sans-serif" font-size="16" fill="#B45309">• 레이아웃 생성 가능성: 보통 이상</text>

